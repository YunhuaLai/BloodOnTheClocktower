id: r013
name: 管家
type: outsider
summary: 投票会受主人选择限制。它制造投票行为异常，也给邪恶方留下伪装空间。
keywords: 投票 限制 外来者
detail:
  overview: 管家让投票行为变得不完全自由。它本身不邪恶，但会让善良方的投票组织更麻烦。
  abilitySummary: 每晚选择主人，白天投票通常需要跟随主人的投票条件。
  playTips:
    - 提前说明你的投票限制，避免被误读成故意划水。
    - 选择主人时优先选你认为会认真投票的人。
    - 你的身份容易被邪恶方冒充，要用投票记录证明自己。
  storytellerTips:
    - 管家主要制造社交约束，不要让玩家忘记投票限制。
    - 新手局可提醒管家提前规划白天投票。
    - 注意区分玩家主动弃票和受能力限制。
  commonMistakes:
    - 完全不解释投票异常。
    - 总选同一个不投票的人做主人。
    - 把管家当成负面身份而不参与讨论。
  relatedRoleIds:
    - r002
    - r019
    - r014
    - r015
englishName: butler
ability: 每个夜晚，你要选择除你以外的一名玩家：明天白天，只有他投票时你才能投票。
edition: custom
