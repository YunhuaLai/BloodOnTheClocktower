id: r004
name: 厨师
type: townsfolk
script: 暗流涌动
scriptId: s001
summary: 得知相邻邪恶玩家的组合数量。座位关系越清晰，信息价值越高。
keywords: 开局 相邻 邪恶 数字
detail:
  overview: 厨师把座位关系变成线索。数字不告诉你谁邪恶，但能限制邪恶方可能的相邻组合。
  abilitySummary: 开局得到邪恶玩家相邻组合数量。
  playTips:
    - 把你的数字和座位图一起看，不要孤立理解。
    - 当有人被确认善良或邪恶时，厨师信息会突然变得更有价值。
    - 低数字不代表安全，高数字也不代表所有相邻都可疑。
  storytellerTips:
    - 厨师数字影响范围大，新手局要确保玩家能理解相邻组合的含义。
    - 如果数字很极端，注意邪恶方是否还有可用伪装空间。
    - 可以提醒玩家死亡不会改变开局座位关系。
  commonMistakes:
    - 把相邻玩家个人化，而不是理解为组合数量。
    - 死亡后重新计算座位，导致逻辑偏离。
    - 忽略陌客或间谍可能影响侦测类理解。
  relatedRoleIds:
    - r005
    - r018
    - r016
    - r021
englishName: chef
scriptIds:
  - s001
  - s005
  - s007
ability: 首夜得知场上有多少对相邻而坐的邪恶玩家。
