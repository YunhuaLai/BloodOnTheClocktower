id: r018
name: 间谍
type: minion
script: 暗流涌动
scriptId: s001
summary: 掌握大量局面信息，并可能在侦测中表现得像善良角色。
keywords: 全局信息 伪装 爪牙
detail:
  overview: 间谍是信息型爪牙。它知道得多，适合帮助邪恶方选择伪装、避开危险和反制信息角色。
  abilitySummary: 能获得大量局面信息，并可能在侦测中被视作善良身份。
  playTips:
    - 利用你掌握的信息帮恶魔选择安全伪装。
    - 不要因为知道太多就说得太准，过度精准会像开视角。
    - 可以主动跳一个能解释当前局面的身份。
  storytellerTips:
    - 间谍信息强度高，要给玩家足够时间理解局面。
    - 侦测中把间谍视作善良时，要考虑这会如何影响信息链。
    - 新手局里间谍可以帮助邪恶方不至于被开局信息压垮。
  commonMistakes:
    - 发言过于全知，暴露信息来源。
    - 只顾自保，不帮恶魔规划伪装。
    - 忘记自己可能在侦测中表现得不像爪牙。
  relatedRoleIds:
    - r003
    - r007
    - r001
    - r021
englishName: spy
scriptIds:
  - s001
  - s004
ability: 每晚查看魔典。即使死亡，你也可能被侦测为善良阵营、镇民或外来者。
