id: r003
name: 调查员
type: townsfolk
summary: 开局得到爪牙相关线索。适合压缩邪恶方空间，也容易被邪恶方反利用。
keywords: 开局 信息 爪牙
detail:
  overview: 调查员是开局施压位。它能把怀疑集中到两名玩家附近，但也最容易被邪恶方包装成误导或假信息。
  abilitySummary: 开局得到一个爪牙身份，以及两名候选玩家；其中一名候选与该身份有关。
  playTips:
    - 早期可以隐晦施压候选人，观察他们如何解释身份和投票。
    - 不要只凭二选一处决，最好结合其他信息角色和行为轨迹。
    - 如果候选人跳强力镇民，先评估他的信息是否能被验证。
  storytellerTips:
    - 给调查员的信息会直接影响开局火力，应避免让一方过早失去空间。
    - 可以用陌客或投毒者制造合理疑云，但要让玩家能复盘。
    - 新手局里建议让候选关系有明显讨论价值。
  commonMistakes:
    - 把候选人之外的人全部洗白。
    - 忽略投毒者可能污染调查员信息。
    - 邪恶方被点到后只否认，不准备替代解释。
  relatedRoleIds:
    - r017
    - r018
    - r019
    - r016
englishName: investigator
ability: 首夜得知一个爪牙角色，并看到两名玩家；其中一名玩家是该爪牙。
