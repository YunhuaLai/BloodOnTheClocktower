id: r006
name: 占卜师
type: townsfolk
script: 暗流涌动
scriptId: s001
summary: 每晚检查两名玩家中是否存在恶魔。强力但可能受到红鲱鱼等误导。
keywords: 每晚 恶魔 检查 二选一
detail:
  overview: 占卜师是强力找恶魔角色，但它天然带有误导点。它适合逐步排除范围，而不是一晚直接拍死目标。
  abilitySummary: 每晚选择两名玩家，得知其中是否有恶魔相关命中；场上会有一个特殊误导目标。
  playTips:
    - 用交叉检查缩小范围，不要只围绕一次命中做结论。
    - 尽量规划检查组合，让每晚结果都能排除一批可能性。
    - 记得误导目标可能让善良玩家看起来像恶魔。
  storytellerTips:
    - 误导目标应制造推理张力，而不是让信息完全失效。
    - 占卜师过强时，投毒或误导目标能给邪恶方喘息空间。
    - 新手局可以让检查结果更适合讲解排除法。
  commonMistakes:
    - 把命中结果直接等同于两人里必有恶魔。
    - 忽略红鲱鱼式误导目标。
    - 每晚随意点人，导致信息无法互相验证。
  relatedRoleIds:
    - r021
    - r017
    - r016
    - r018
englishName: fortune-teller
