id: r010
name: 贞洁者
type: townsfolk
summary: 被镇民提名时可能让提名者立刻死亡。常用于验证提名者或制造白天爆点。
keywords: 提名 验证 死亡
detail:
  overview: 贞洁者是公开验证位。它能用一次提名事件验证提名者身份方向，但也会打乱当天节奏。
  abilitySummary: 第一次被镇民提名时，提名者可能立即死亡。
  playTips:
    - 如果要公开验证，最好让值得验证的人来提名。
    - 触发后要迅速讨论这次死亡说明了什么。
    - 没有触发不一定代表提名者邪恶，也可能有醉酒或中毒。
  storytellerTips:
    - 触发时机很有戏剧性，要清楚处理提名和死亡流程。
    - 新手局可提醒玩家这是一次性强验证，不是普通处决。
    - 中毒或醉酒会让结果产生巨大讨论空间。
  commonMistakes:
    - 随便让低价值目标提名浪费验证。
    - 没有触发就直接定死提名者身份。
    - 忘记触发会立即改变白天处决节奏。
  relatedRoleIds:
    - r007
    - r014
    - r017
    - r015
englishName: virgin
ability: 当你首次被提名时，如果提名你的玩家是镇民，他立刻被处决。
edition: custom
