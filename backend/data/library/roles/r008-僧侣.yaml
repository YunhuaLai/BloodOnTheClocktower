id: r008
name: 僧侣
type: townsfolk
summary: 夜晚保护一名玩家免受恶魔影响。保护选择常常能改变邪恶方节奏。
keywords: 保护 夜晚 恶魔
detail:
  overview: 僧侣是夜晚保护位。它不直接给信息，但成功保护可能改变死亡结果，并让善良方判断恶魔目标。
  abilitySummary: 每晚选择一名其他玩家，使其免受恶魔影响。
  playTips:
    - 优先保护公开强信息位或残局关键身份。
    - 不要总按固定模式保护，邪恶方会读你的习惯。
    - 没有死亡不一定代表你保护成功，也可能有其他原因。
  storytellerTips:
    - 僧侣保护会影响夜晚死亡，要清楚区分恶魔影响和其他效果。
    - 新手局可让保护结果有讨论价值。
    - 如果僧侣长期公开，邪恶方应仍有合理处理路线。
  commonMistakes:
    - 认为无死亡一定是僧侣立功。
    - 保护目标过于固定。
    - 忘记不能保护自己。
  relatedRoleIds:
    - r011
    - r012
    - r009
    - r021
englishName: monk
ability: 每晚选择除自己以外的一名玩家；该玩家今晚免受恶魔影响。
