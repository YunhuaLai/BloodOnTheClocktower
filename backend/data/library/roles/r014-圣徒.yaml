id: r014
name: 圣徒
type: outsider
summary: 被处决会带来灾难性后果。善良方需要谨慎处理他的可信度。
keywords: 处决 风险 外来者
detail:
  overview: 圣徒是处决风险位。它让善良方不能只按怀疑程度投票，也给邪恶方提供了强力伪装。
  abilitySummary: 如果被白天处决，会导致善良方失败。
  playTips:
    - 你需要尽早建立可信度，但不能只用身份威胁全桌。
    - 如果有人也跳圣徒，重点比较发言、投票和配置逻辑。
    - 残局时要清楚说明为什么处决你是高风险选择。
  storytellerTips:
    - 圣徒会显著影响白天处决心理，适合制造难题而不是纯惩罚。
    - 新手局要确保玩家理解处决和夜晚死亡的区别。
    - 如果邪恶方假跳圣徒，要给善良方留出识别空间。
  commonMistakes:
    - 圣徒完全拒绝参与推理。
    - 善良方因为害怕圣徒而停止处决。
    - 把被恶魔杀死也误认为触发失败条件。
  relatedRoleIds:
    - r002
    - r010
    - r019
    - r021
englishName: saint
ability: 如果你死于处决，邪恶方获胜。
