id: r005
name: 共情者
type: townsfolk
summary: 每晚关注左右邻座的邪恶数量。随着死亡和座位变化，能持续提供压力。
keywords: 每晚 邻座 邪恶 数字
detail:
  overview: 共情者是持续信息位。它的强度来自多晚数字变化，尤其适合配合死亡、座位和处决记录推理。
  abilitySummary: 每晚得到当前相邻存活玩家中邪恶玩家的数量。
  playTips:
    - 每天记录数字和当晚左右邻座状态，变化比单个数字更重要。
    - 不要只盯左右两人，死亡后的新邻座也会给出新信息。
    - 如果数字不合逻辑，优先考虑中毒、醉酒或身份误判。
  storytellerTips:
    - 共情者信息会持续改变局面，投毒目标选择会很关键。
    - 新手局可以提醒玩家相邻关系会因死亡而变化。
    - 避免连续给出让玩家完全无从解释的数字。
  commonMistakes:
    - 忘记死亡玩家不再作为当前相邻目标。
    - 只用一天数字强推处决。
    - 忽略投毒者对连续信息的破坏。
  relatedRoleIds:
    - r004
    - r017
    - r016
    - r018
englishName: empath
ability: 每个夜晚,你会得知与你邻近的两名存活的玩家中邪恶玩家的数量。
edition: custom
image: https://oss.gstonegames.com/data_file/clocktower/web/icons/empath.png
flavor: ''
setup: false
reminders: []
remindersGlobal: []
firstNightReminder: 唤醒共情者，对他用手势比划数字来告知他与他邻近的存活玩家中有几人是邪恶玩家。
otherNightReminder: 唤醒共情者，对他用手势比划数字来告知他与他邻近的存活玩家中有几人是邪恶玩家。
