otherNightReminder: 唤醒黑美人。让黑美人指向任意一名玩家。标记该玩家死亡。随后询问黑美人是否使用技能，如果他点头，让黑美人选择一名玩家并给出一件事。让黑美人重新入睡。
summary: >-
  每个夜晚*，你要选择一名玩家：他死亡。每局游戏限一次，在这之后，你可以选择一名玩家并给出一件事：他需要“疯狂”证明这件事直至其死亡，不然他可能被处决。如果白天有非镇民玩家死亡，该技能使用次数加一。当仅剩一名存活善良玩家未被你选择过时，邪恶阵营获胜。
