id: r009
name: 守鸦人
type: townsfolk
summary: 如果夜晚死亡，可以立即查看一名玩家身份。死亡本身会变成一次反击机会。
keywords: 死亡 查看 身份 夜晚
detail:
  overview: 守鸦人是反击型信息位。邪恶方杀到他会付出信息代价，但善良方也不能只靠求死来赢。
  abilitySummary: 如果在夜晚死亡，可以查看一名玩家身份。
  playTips:
    - 不要过早暴露自己，否则恶魔通常会避开你。
    - 如果你死亡，优先查能影响残局或解释矛盾的人。
    - 活着时也要正常参与发言，不要只等待能力触发。
  storytellerTips:
    - 守鸦人查验对象会强烈影响残局，给出的身份要准确结算。
    - 可以让邪恶方通过发言判断是否冒险杀他。
    - 新手局可提醒玩家夜晚死亡和白天处决触发条件不同。
  commonMistakes:
    - 白天被处决后期待触发能力。
    - 过早跳明导致永远不被杀。
    - 查一个对当前局面帮助不大的目标。
  relatedRoleIds:
    - r008
    - r007
    - r021
    - r017
englishName: ravenkeeper
ability: 如果你在夜晚死亡，你会被唤醒并选择一名玩家，得知其角色。
