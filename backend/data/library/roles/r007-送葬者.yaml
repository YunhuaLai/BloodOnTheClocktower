id: r007
name: 送葬者
type: townsfolk
summary: 得知白天被处决玩家的身份。能验证处决结果，是善良方的重要锚点。
keywords: 处决 验证 身份 白天
detail:
  overview: 送葬者把白天处决变成信息收益。只要活着并可信，他能逐步验证跳身份和处决方向。
  abilitySummary: 夜晚得知当天被处决玩家的身份。
  playTips:
    - 处决后的身份验证能帮助全桌判断谁在说谎。
    - 如果你活得太久，邪恶方可能正在利用你或让你中毒。
    - 关键结果可以暂时隐藏，等待合适时机一起公开。
  storytellerTips:
    - 送葬者信息是善良方锚点，投毒者目标选择会影响节奏。
    - 如果处决对象身份能揭开大局，注意邪恶方是否仍有反打空间。
    - 新手局可用送葬者帮助玩家理解处决不只是杀人。
  commonMistakes:
    - 没有处决就期待信息收益。
    - 把送葬者活着视为必然可信。
    - 忽略间谍和投毒者能影响身份判断。
  relatedRoleIds:
    - r010
    - r017
    - r018
    - r021
englishName: undertaker
ability: 每个夜晚*，你会得知今天白天死于处决的玩家的角色。
edition: custom
image: https://oss.gstonegames.com/data_file/clocktower/web/icons/undertaker.png
flavor: ''
setup: false
reminders:
  - 死于今日
remindersGlobal: []
firstNightReminder: ''
otherNightReminder: 如果今天白天有玩家死于处决，唤醒送葬者，对他展示那名玩家的角色标记。
