summary: 每晚*杀人；若杀死邻近镇民，除旅行者外所有善良玩家会中毒到下个黄昏。
keywords: 恶魔 每晚 击杀 邻近 镇民 中毒
englishName: chaos
ability: 每个夜晚*，你要选择一名玩家：他死亡。如果你以这种方式杀死了一名与你邻近的镇民玩家，所有善良玩家会中毒直到下个黄昏。
