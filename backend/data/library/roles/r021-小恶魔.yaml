id: r021
name: 小恶魔
type: demon
script: 暗流涌动
scriptId: s001
summary: 每晚造成死亡，并可能通过自杀转移恶魔身份。是入门板子的核心威胁。
keywords: 恶魔 击杀 转移
detail:
  overview: 小恶魔是暗流涌动的核心邪恶身份。它既要稳定制造死亡，又能通过转移身份打乱善良方的最终判断。
  abilitySummary: 每晚选择目标造成死亡，并可能通过特殊方式把恶魔身份转移给爪牙。
  playTips:
    - 击杀目标要兼顾信息威胁、保护风险和残局投票。
    - 如果被严重怀疑，可以考虑是否需要转移身份制造第二战场。
    - 伪装要能解释夜晚死亡和白天信息，而不只是报一个身份。
  storytellerTips:
    - 小恶魔转移是入门板的关键戏剧点，要准确处理死亡和新恶魔身份。
    - 新手局可以让恶魔击杀选择产生清楚的讨论线索。
    - 注意红唇女郎和其他爪牙存在时的接替关系。
  commonMistakes:
    - 恶魔只杀强信息位，导致击杀路线太明显。
    - 转移时没有准备好新恶魔的发言身份。
    - 善良方只找第一任恶魔，忽略身份可能已经转移。
  relatedRoleIds:
    - r020
    - r008
    - r011
    - r012
    - r006
englishName: imp
