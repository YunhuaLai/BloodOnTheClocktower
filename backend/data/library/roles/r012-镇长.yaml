id: r012
name: 镇长
type: townsfolk
summary: 残局能力很强，若善良方能保护其可信度，可能直接改变胜负路径。
keywords: 残局 胜利 保护 镇长
detail:
  overview: 镇长是残局核心身份。它的威胁不在早期信息，而在让邪恶方必须处理一个可能改变胜负条件的目标。
  abilitySummary: 在特定残局条件下可能让善良方获胜，并可能影响恶魔夜晚目标。
  playTips:
    - 早期不要只靠身份求保护，要用发言建立可信度。
    - 残局前要让全桌理解为什么你值得留下。
    - 如果夜晚死亡异常，要把僧侣、士兵和镇长相关可能都纳入讨论。
  storytellerTips:
    - 镇长结算会直接影响胜负，残局前要确认条件。
    - 邪恶方需要知道镇长是必须被处理的长期威胁。
    - 新手局里可以适度提醒镇长不是普通无信息镇民。
  commonMistakes:
    - 镇长只报身份，不参与推理。
    - 善良方过早处决镇长，失去残局路线。
    - 把所有夜晚异常都归因于镇长。
  relatedRoleIds:
    - r008
    - r011
    - r021
    - r020
englishName: mayor
ability: 如果只有三名玩家存活且白天没有人被处决，你的阵营获胜。如果你在夜晚死亡，可能会有一名其他玩家代替你死亡。
