id: r016
name: 陌客
type: outsider
summary: 在侦测中可能被视作邪恶身份。它会污染信息，但也能解释异常结果。
keywords: 误判 信息污染 外来者 陌客
detail:
  overview: 陌客让侦测结果不再简单。它是善良阵营，却可能在某些信息里表现得像邪恶。
  abilitySummary: 在侦测中可能被视为邪恶角色或邪恶阵营。
  playTips:
    - 如果你被多个信息指向邪恶，陌客身份可以解释但不能自动洗白。
    - 公开时机要谨慎，过早公开可能帮邪恶方解释太多异常。
    - 和调查员、厨师、共情者等信息一起复盘。
  storytellerTips:
    - 陌客的误判应帮助制造可讨论矛盾，而不是随意混淆所有信息。
    - 新手局可用陌客讲解为什么侦测不是绝对真相。
    - 注意陌客既能保护善良方，也能给邪恶方伪装借口。
  commonMistakes:
    - 陌客一跳就被全桌完全相信。
    - 所有邪恶结果都用陌客解释掉。
    - 忽略陌客仍然是善良玩家，需要正常投票和发言。
  relatedRoleIds:
    - r003
    - r004
    - r005
    - r006
englishName: recluse
ability: 你可能会被当作邪恶阵营、爪牙角色或恶魔角色，即使你已死亡。
