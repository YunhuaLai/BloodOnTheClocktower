id: r020
name: 红唇女郎
type: minion
summary: 恶魔死亡后可能接替恶魔位置。让善良方不能只满足于一次处决。
keywords: 继承 恶魔 续命 爪牙 红唇女郎
detail:
  overview: 红唇女郎是邪恶方保险。她让善良方即使处决恶魔，也可能还没真正结束游戏。
  abilitySummary: 在特定条件下，恶魔死亡后可能由她接替恶魔位置。
  playTips:
    - 作为邪恶方，要让自己看起来不像恶魔接班人。
    - 恶魔被逼入绝境时，提前规划接替后的伪装路线。
    - 善良方发现恶魔线索时，也要判断是否存在接替可能。
  storytellerTips:
    - 接替时机关系胜负，要准确判断人数和条件。
    - 新手局可在复盘时解释为什么处决恶魔不一定立即结束。
    - 确保红唇女郎接替后仍有可玩的残局空间。
  commonMistakes:
    - 善良方处决一个疑似恶魔后立刻停止推理。
    - 红唇女郎前期发言过于像爪牙，接替后无法自圆其说。
    - 邪恶方没有提前准备第二套恶魔路线。
  relatedRoleIds:
    - r021
    - r012
    - r007
    - r006
englishName: scarlet-woman
ability: 如果大于等于五名玩家存活时（旅行者不计算在内）恶魔死亡，你变成那个恶魔。
edition: custom
image: https://oss.gstonegames.com/data_file/clocktower/web/icons/scarlet_woman.png
flavor: ''
setup: false
reminders:
  - 是恶魔
remindersGlobal: []
firstNightReminder: ''
otherNightReminder: 如果红唇女郎的能力曾被触发，唤醒她并告知她变成了哪个恶魔角色。
