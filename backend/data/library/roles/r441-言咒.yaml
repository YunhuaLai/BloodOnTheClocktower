summary: 过于沉默或强制他人沉默的玩家可能会发生不好的事情。游戏开始时，一名善良玩家会获得能力：首个夜晚，你得知一段短语。每局游戏限一次，一名存活爪牙可以公开猜测你是言咒。如果猜测正确或你在某个白天没有公开说过该短语，你的阵营落败，即使你已死亡。
