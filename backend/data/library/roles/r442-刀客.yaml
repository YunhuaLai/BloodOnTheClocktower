firstNightReminder: |-
  在为首个夜晚做准备时，将刀客的“追杀”标记放置在一个爪牙角色标记旁。
  在首个夜晚，唤醒刀客。对他展示标记了“追杀”的爪牙角色标记。让刀客重新入睡。
otherNightReminder: ''
summary: 在你的首个夜晚，你得知一个在场的爪牙角色。每局游戏限一次，你可以在白天公开选择一名玩家：如果他是你得知的角色，他死亡。
