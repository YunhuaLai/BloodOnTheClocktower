firstNightReminder: 唤醒所有妄想乐园进行互认，然后再分别唤醒每个妄想乐园，让他得知哪些乐园游民把他当做恶魔/爪牙，他们以为谁是爪牙、他们自以为的角色。
otherNightReminder: 唤醒所有妄想乐园，让他们共同选择一名玩家。
summary: >-
  你们相互认识，你会得知哪些乐园游民以为你是恶魔/爪牙、他们以为谁是爪牙、他们自以为的角色。每个夜晚*，你们共同选择一名玩家：他死亡。任何一名妄想乐园死于处决，邪恶阵营落败。[会有2-4名妄想乐园在场，无爪牙在场，所有善良玩家都是乐园游民]
