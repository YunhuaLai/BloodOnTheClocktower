id: r001
name: 洗衣妇
type: townsfolk
script: 暗流涌动
scriptId: s001
scriptNames:
  - 暗流涌动
  - 美愿成真
summary: 开局得知两名玩家中有一位是某个镇民。适合早期建立可信信息链。
keywords: 开局 信息 镇民 二选一
detail:
  overview: 洗衣妇是善良方早期拼图角色，价值在于确认一个镇民身份，并帮助被确认者更容易被全桌接纳。
  abilitySummary: 开局得到一个镇民身份，以及两名候选玩家；其中一名候选与该身份有关。
  playTips:
    - 不要只报两个名字，最好说明你想验证的逻辑和候选人的发言质量。
    - 如果候选人中有人主动跳出对应身份，可以让他先给信息，再决定是否公开你自己的线索。
    - 你的信息更适合建立可信链，不适合单独决定处决。
  storytellerTips:
    - 新手局可给较容易理解的身份，帮助玩家学习信息链。
    - 如果场上有酒鬼或投毒者，可以让信息略有张力，但仍保留可推理空间。
    - 注意不要让洗衣妇信息直接锁死邪恶方全部伪装。
  commonMistakes:
    - 把候选二选一当成绝对验人结果。
    - 过早公开导致邪恶方轻松调整伪装。
    - 忽略候选人的实际发言和投票行为。
  relatedRoleIds:
    - r002
    - r003
    - r007
    - r015
englishName: washerwoman
scriptIds:
  - s001
  - s010
ability: 首夜得知一个镇民角色，并看到两名玩家；其中一名玩家是该镇民。
