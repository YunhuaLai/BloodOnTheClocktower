id: s009
name: 刀光剑影
en: Dao Guang Jian Ying
level: 民间高信息自定义剧本
mood: 强信息链、中毒醉酒、死亡干扰
text: 长泣创作的 7–15 人自定义剧本，信息位密度高，同时由普卡、诺达鲺、亡骨魔、女巫和鹰身女妖制造强干扰。
image: /assets/medieval-town-night.jpg
tags:
  - 民间剧本
  - 高信息
  - 中毒醉酒
sourceUrl: ''
detail:
  overview: >-
    刀光剑影是一张高信息、高干扰的自定义剧本。修行者、贵族、筑梦师、数学家、气球驾驶员、卖花女孩、博学者、女裁缝等角色能快速建立信息网，但普卡、诺达鲺、亡骨魔、吐上人、疯疫医生、女巫和鹰身女妖会持续污染结果与白天行为。
  bestFor:
    - 喜欢硬核信息交叉验证和复杂异常复盘的熟手玩家。
    - 能接受中毒、醉酒、能力失效和额外死亡频繁出现的牌桌。
    - 说书人想练习数学家、传教士、普卡、小怪宝等高记录量角色。
  playStyle:
    - 善良方不能只相信单点信息，要结合数学家数字、投票信息和死亡来源一起判断。
    - 外来者会显著影响能力有效性与阵营判断，尤其是莽夫、吐上人和疯疫医生。
    - 邪恶方可以通过女巫、鹰身女妖、普卡和小怪宝持续打乱白天节奏。
  storytellerNotes:
    - 本剧本需要细致记录每晚中毒、醉酒、能力失效和死亡来源。
    - 传教士会关闭爪牙能力，数学家需要据此判断有多少能力未正常生效。
    - 小怪宝在场时，恶魔归属由爪牙秘密决定，需要每晚单独记录照看者。
  commonPitfalls:
    - 只看信息结论，不追踪该夜谁可能中毒、醉酒或能力失效。
    - 忽略普卡的延迟死亡节奏，把死亡误判成当晚击杀。
    - 忘记小怪宝局中恶魔可能不是固定同一名玩家。
