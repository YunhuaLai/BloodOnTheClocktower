id: s007
name: 罂粟花开
en: Lu Su Hua Kai
level: 民间自定义剧本
mood: 疯狂机制、身份误导、邪恶不互认
text: Dan 创作的 7–15 人自定义剧本，以罂粟种植者、镜像双子、疯子、提线木偶和多种疯狂机制制造身份错位。
image: /assets/clock-tower-night.jpg
tags:
  - 民间剧本
  - 疯狂机制
  - 身份误导
sourceUrl: ''
detail:
  overview: >-
    罂粟花开是一张以身份误导和疯狂机制为核心的自定义剧本。善良方有图书管理员、厨师、占卜师、神谕者、博学者等稳定信息位，但疯子、酒鬼、洗脑师、镜像双子、提线木偶和罂粟种植者会让身份与阵营关系长期处在不确定状态。
  bestFor:
    - 熟悉基础角色，想练习疯狂机制和身份伪装的玩家。
    - 喜欢通过发言、跳身份和死亡轨迹推断真实配置的牌桌。
    - 说书人想练习罂粟种植者、镜像双子和提线木偶等复杂身份关系。
  playStyle:
    - 善良方需要把首夜信息、每日信息和疯狂表现结合起来交叉验证。
    - 邪恶方可以围绕提线木偶、镜像双子、疯子和洗脑师制造身份叙事。
    - 罂粟种植者在场时，邪恶方互认可能被延迟，前期发言会更混乱。
  storytellerNotes:
    - 开局前提醒玩家本剧本包含较多疯狂和身份误导机制。
    - 罂粟种植者、提线木偶、疯子、镜像双子都需要清楚记录互认和误认关系。
    - 涡流在场时，镇民信息必须为错；亡骨魔和军团则会改变常规死亡与阵营判断。
  commonPitfalls:
    - 把疯狂表现直接当成真实身份，忽略洗脑师或小精灵。
    - 忘记罂粟种植者死亡后邪恶方才会互相认识。
    - 只按常规恶魔逻辑推理，忽略军团或涡流的特殊胜利压力。
