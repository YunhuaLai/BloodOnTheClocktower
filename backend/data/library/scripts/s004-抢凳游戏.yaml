id: s004
name: 抢凳游戏
en: One In One Out
level: 官方推荐自定义剧本
mood: 阵营变化、外来者压力、方古路线
text: Baron von Klutz 创作的官方推荐自定义剧本。核心围绕莽夫、村夫、方古与圣洁之魂的阵营边界展开。
image: /assets/clock-tower-night.jpg
tags:
