id: s003
name: 梦殒春宵
en: Sects & Violets
level: 高混乱
mood: 跳身份、假信息、强表达
text: 信息量很大，也很容易错。适合熟悉基础节奏后尝试，玩家需要处理公开宣称和信息污染。
image: https://images.unsplash.com/photo-1505142468610-359e7d316be0?auto=format&fit=crop&w=900&q=80
tags:
  - 高信息量
  - 强伪装
  - 适合老手
detail:
  overview: 梦殒春宵强调强能力、强伪装和高频信息碰撞。它鼓励玩家公开表达，但也会奖励能驾驭混乱的人。
  bestFor:
    - 熟悉基础板并愿意处理大量公开信息的玩家
    - 喜欢跳身份、交叉验证和反向伪装的队伍
    - 说书人已经能稳定掌控节奏与信息压力的场合
  playStyle:
    - 善良方需要快速归纳信息来源，再判断哪些信息可能受到污染。
    - 邪恶方可以主动制造身份冲突，把真实信息变成不可信的噪音。
    - 每次公开信息都可能改变全桌认知，表达能力和时机非常关键。
  storytellerNotes:
    - 信息强度很高，给错信息或处理错顺序会明显影响体验。
    - 需要关注新人是否被信息量淹没，必要时帮助他们抓住主要矛盾。
    - 邪恶方需要足够可用的伪装空间，否则局面会过早坍塌。
  commonPitfalls:
    - 玩家只堆信息数量，却不整理可信度和来源。
    - 过早把异常信息全部归因于邪恶，忽略能力本身的混乱设计。
    - 说书人给出的信息压力过大，让善良方或邪恶方失去可玩空间。
