id: s008
name: 瞒天过海
en: Ming Tian Guo Hai
level: 民间自定义剧本
mood: 外来者压力、一次性能力、方古转化
text: Lau 创作的 7–15 人自定义剧本，围绕外来者数量变化、暮滩少女风险和方古转化路线展开。
image: /assets/candle-book.jpg
tags:
  - 民间剧本
