sourceUrl: ''
detail:
  overview: >-
    瞒天过海是一张围绕外来者数量、一次性强能力和方古转化展开的自定义剧本。善良方拥有贵族、哲学家、巡山人、猎手、渔夫、食人族等关键资源，但暮滩少女、傀儡、呆瓜、酒鬼和提线木偶会让公开身份与处决路线变得危险。
  bestFor:
    - 喜欢外来者配置推理和一次性技能时机判断的玩家。
    - 能接受暮滩少女、呆瓜、方古等特殊失败或转化机制的牌桌。
    - 说书人想练习外来者数量调整和方古首次跳转记录。
  playStyle:
    - 善良方需要谨慎处理暮滩少女、呆瓜和傀儡，避免公开信息反而触发失败风险。
    - 一次性能力应尽量在信息链形成后使用，而不是过早消耗。
    - 邪恶方可以通过方古、提线木偶、红唇女郎和洗脑师制造多层生存路线。
  storytellerNotes:
    - 明确记录外来者数量调整：气球驾驶员、勇爵和方古都会改变配置。
    - 方古每局只能成功转化一次，成功与否需要立即记录。
    - 暮滩少女、呆瓜、傀儡都可能让白天公开行为产生直接后果。
  commonPitfalls:
    - 忘记方古增加外来者并且只能成功转化一次。
    - 让暮滩少女过早暴露，给爪牙直接猜中的机会。
    - 把呆瓜死亡选择当成普通死亡后信息，而不是潜在失败条件。
