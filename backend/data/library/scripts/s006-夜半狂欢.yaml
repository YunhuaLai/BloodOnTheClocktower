detail:
  overview: >-
    夜半狂欢是 Zets
    创作的高人气进阶自定义剧本。它不像传统强信息板那样稳步缩圈，而是靠贵族、工程师、巡山人、教授、精神病患者、亡骨魔与哈迪寂亚这类高影响力角色不断改写桌面节奏；无神论者、落难少女、罂粟种植者和圣洁之魂则让真相经常被包在多层戏剧性事件里。
  bestFor:
    - 已经熟悉三大基础板与实验角色，想体验高波动功能位对局的玩家。
    - 接受公开击杀、特殊胜利条件、落难少女与无神论者这类高戏剧性机制的牌桌。
    - 说书人愿意处理公开触发、额外死亡、角色改写与规则例外的复杂场合。
  playStyle:
    - 善良方前期线索通常不算密集，更多依赖贵族、热气球、博学者先缩范围，再靠教授、巡山人、工程师、农夫等角色建立硬信息。
    - 邪恶方前期常被罂粟种植者压制协作，随后则能借投毒者、麻脸巫婆、精神病患者和梅兹菲勒斯迅速打乱节奏。
    - 落难少女、无神论者、圣洁之魂与双恶魔候选会让桌面频繁从“找恶魔”转成“先判断这局是不是正常结构”。
  storytellerNotes:
    - 开局前最好明确说明：这是一张高波动自定义剧本，玩家可能遇到无神论局、落难少女输法与公开白天击杀。
    - 精神病患者、魔像与哈迪寂亚都会制造公开或半公开死亡，流程和口径要提前想清楚。
    - 若出现巡山人命中落难少女、工程师改邪恶身份、麻脸巫婆改角、无神论者扰动规则等情况，务必第一时间更新记录。
  commonPitfalls:
    - 把前期缺少直接邪恶信息简单理解成“好人全空转”，忽略罂粟种植者与高功能位本来就会让前几天更像布局期。
    - 过早相信单点自证，忘记教授复活、巡山人救人、精神病患者公开杀人都仍然可能存在剧本内反解释。
    - 遇到异常时只往中毒或酒鬼上想，忽略无神论者、麻脸巫婆、工程师与落难少女同样会改写逻辑。
