id: s002
name: 黯月初升
en: Bad Moon Rising
level: 进阶
mood: 死亡、保护、连锁反应
text: 更强调死亡方式、保护能力和夜晚事件。判断谁该死、谁没死、为什么没死，会成为核心线索。
image: https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=900&q=80
tags:
  - 生死谜题
  - 夜晚行动
  - 保护链
detail:
  overview: 黯月初升把重点放在死亡、复活、保护和异常生存上。玩家不只是问谁说谎，还要问为什么今晚死的是这些人。
  bestFor:
    - 已经熟悉白天提名、夜晚行动和信息可靠性的玩家
    - 喜欢从死亡顺序、保护痕迹和连锁结果推理的队伍
    - 能接受局面偶尔因为生死效果变得很戏剧化的玩家
  playStyle:
    - 善良方要记录每晚死亡数量、死亡对象和声称的保护行为。
    - 邪恶方可以利用保护、免死和复活信息制造多种解释路线。
    - 公开身份的时机很重要，过早暴露保护位可能让夜晚节奏失控。
  storytellerNotes:
    - 死亡信息本身就是线索，夜晚结果应让玩家有可讨论的抓手。
    - 保护与伤害效果交错时，要保证解释路径在规则上自洽。
    - 新队伍可以先提醒他们记录每天死亡和未死亡的异常点。
  commonPitfalls:
    - 只追发言矛盾，忽略死亡模式本身透露的信息。
    - 把没有死亡简单理解成善良方保护成功，而忽略邪恶方也能制造异常。
    - 说书人没有提前理清夜晚结算，导致白天信息难以复盘。
