id: s010
name: 美愿成真
en: May Wishes Come True
level: 民间自定义剧本
mood: 信息引导、保护博弈、死亡节奏变化
text: 海雾创作的 7-15 人自定义剧本，围绕信息方向、爪牙压制、保护免死与多恶魔死亡节奏展开。
image: /assets/candle-book.jpg
