  - 死亡节奏
sourceUrl: ''
detail:
  overview: >-
    美愿成真是一张兼具信息推进与死亡节奏变化的自定义剧本。洗衣妇、修行者、祈求者、侍女、热气球和博学者能从身份、方向、夜晚行动与真假信息中逐步拼图；传教士、教授、公主、茶艺师和弄臣则为善良方提供关键保护与回旋空间。邪恶方可以通过投毒者、教父、魔鬼代言人、灵言师以及珀、沙巴洛斯、亡骨魔、小怪宝制造误导、额外死亡和阵营压力。
  bestFor:
    - 喜欢从多源信息中交叉验证，并接受信息可能被中毒、醉酒或陌客干扰的玩家。
    - 适合想体验保护、复活、免死与多死亡来源交织的 7-15 人牌桌。
    - 说书人需要能稳定记录夜晚选择、角色类型信息、死亡来源和能力失效状态。
  playStyle:
    - 善良方要把修行者方向、侍女数字、热气球名单和博学者真假信息放在同一张逻辑网里判断。
    - 传教士与魔鬼代言人的选择会直接影响白天处决结果，处决未死亡不一定代表玩家善良。
    - 邪恶方可以围绕灵言师关键词、投毒者信息污染和不同恶魔的死亡节奏制造多重解释。
  storytellerNotes:
    - 记录传教士曾选中过哪些爪牙，并提醒被选中的爪牙得知自己被传教士选中。
    - 小怪宝在场时，每晚记录秘密照看者和可能死亡；罂粟种植者死亡后要处理邪恶方互认。
    - 公主只在其首个白天提名并处决玩家后生效，当晚恶魔不会造成死亡。
  commonPitfalls:
    - 把魔鬼代言人保护、茶艺师保护、弄臣免死和公主阻止恶魔杀人混为同一种死亡异常。
    - 忘记陌客可能被当作邪恶阵营、爪牙或恶魔，即使已经死亡。
    - 忽略珀上一夜未选择玩家后，下一夜必须选择三名玩家死亡的节奏变化。
