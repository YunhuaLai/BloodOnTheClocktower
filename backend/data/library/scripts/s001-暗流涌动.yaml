id: s001
name: 暗流涌动
en: Trouble Brewing
level: 入门
mood: 清晰、扎实、适合教学
text: 最适合新手的官方板子。信息来源直观，干扰方式有限，适合学习发言、站边、投票和夜晚顺序。
image: https://images.unsplash.com/photo-1516571748831-5d81767b788d?auto=format&fit=crop&w=900&q=80
tags:
  - 推荐首局
  - 逻辑推理
  - 低混乱
detail:
  overview: 暗流涌动是学习血染钟楼的最佳入口。它让玩家能清楚看见信息角色、保护角色、外来者干扰、爪牙破坏和恶魔转移之间的关系。
  bestFor:
    - 第一次或前几次接触游戏的玩家
    - 想练习基础发言、站边和投票节奏的队伍
    - 说书人想稳定教学而不是制造高强度混乱的场合
  playStyle:
    - 善良方应尽早拼接开局信息，并用处决结果持续校验信息链。
    - 邪恶方通常要主动争夺可信身份，避免被多个信息角色同时压缩空间。
    - 残局经常围绕小恶魔是否转移、红唇女郎是否接替、镇长是否可信展开。
  storytellerNotes:
    - 新手局里信息可以给得更清楚，让玩家理解每类角色在局面中的用途。
    - 投毒者、酒鬼和陌客会制造错误信息，但不必每次都把局面推到完全不可读。
    - 需要提醒玩家死亡后仍能发言，并且只剩一次有效投票。
  commonPitfalls:
    - 把每条信息都当成绝对真相，忽略醉酒、中毒和陌客误判。
    - 善良方过晚公开关键信息，导致没有时间交叉验证。
    - 邪恶方只被动防守，不主动构造能解释异常信息的故事。
