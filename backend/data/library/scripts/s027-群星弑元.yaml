detail:
  overview: 群星弑元是原创作者麻生的标准结构剧本，包含大量信息角色、死亡触发角色与特殊恶魔互动。
  bestFor:
    - 熟悉基础流程，想体验原创机制和场地互动的玩家。
  playStyle:
    - 通过左右列、距离、死亡触发和恶魔额外能力形成信息博弈。
  storytellerNotes:
    - 管理员、贡品、心上人、瘟疫医生、男爵、博学者、考古学家等多为被动、白天或事件触发，不一定常规夜晚唤醒。
    - 其他夜晚顺序中的“穷皮者”按角色表理解为“窃皮者”。
  commonPitfalls:
    - 记得处理瘟疫医生与暗杀者的传说角色特殊互动。
    - 若使用寻宝团，应在开局明确宣布剧本外角色并秘密放置角色标记。
