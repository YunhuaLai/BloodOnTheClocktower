id: s011
name: 各凭本事
en: Every One By Their Own Skill
level: 民间自定义剧本
mood: 强信息、阵营转变、相克规则
text: MtyJ 创作的 7-15 人自定义剧本，信息角色密集，同时围绕转化、续恶魔和相克规则制造残局压力。
image: /assets/medieval-town-night.jpg
tags:
  - 民间剧本
  - 高信息
  - 阵营转变
sourceUrl: ''
detail:
  overview: >-
    各凭本事是一张信息量充足、但阵营与恶魔归属可能持续变化的自定义剧本。贵族、阴阳师、共情者、侍女、村夫、占卜师和气球驾驶员能快速建立信息框架；僧侣、赌徒、道士、哲学家、造谣者和俑匠则让夜晚选择、死亡与保护成为关键。邪恶方可以通过投毒者、红唇女郎、召唤师、教父以及方古、奥赫、混沌、珀改变死亡节奏与阵营结构。
  bestFor:
    - 喜欢高信息交叉验证，同时能接受阵营变化和恶魔更替的熟手玩家。
    - 适合想练习方古、红唇女郎、召唤师、入殓师等相克结算的说书人。
    - 牌桌需要愿意细致记录死亡来源、提名处决、醉酒中毒和阵营变化。
  playStyle:
    - 善良方要把贵族、阴阳师、共情者、村夫和占卜师信息放在时间线上交叉验证。
    - 处决恶魔不一定代表游戏立即稳定，红唇女郎、入殓师、方古和召唤师都会改变恶魔归属。
    - 邪恶方可以利用投毒者、混沌和奥赫制造信息污染，并借外来者死亡触发教父。
  storytellerNotes:
    - 需要提前理清入殓师与红唇女郎、方古与红唇女郎的相克规则，避免处决或转化后重复续恶魔。
    - 召唤师局无初始恶魔，第三夜转化目标和所选恶魔需要清楚记录。
    - 圣洁之魂限制游戏过程中额外邪恶玩家总量，处理方古、逆臣、入殓师和灵活续恶魔时要同步检查。
  commonPitfalls:
    - 把方古转化外来者后的死亡误判为红唇女郎可接替的恶魔死亡。
    - 忽略入殓师在四名或更少存活玩家时失去能力。
    - 忘记混沌只在杀死邻近镇民时让除旅行者外所有善良玩家中毒。
